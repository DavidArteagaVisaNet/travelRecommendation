    <title>TravelBoom - Contact Us</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <img src="logo-PC-V1.jpg" class="logo">
    </div>

    <div class="nav-center">
        <a href="travel_recommendation.html">Home</a>
        <a href="about.html">About Us</a>
        <a href="contact.html">Contact Us</a>
    </div>
</nav>

<section class="page-hero small-hero">
    <h1>Contact Us</h1>
</section>

<section class="contact-container-modern">

    <div class="contact-card">
        <h2>We’d Love to Hear From You</h2>

        <form class="modern-form">
            <div class="form-group">
                <input type="text" placeholder="Your Name" required>
            </div>

            <div class="form-group">
                <input type="email" placeholder="Your Email" required>
            </div>

            <div class="form-group">
                <textarea rows="5" placeholder="Your Message" required></textarea>
            </div>

            <button type="submit" class="submit-btn">Submit Message</button>
        </form>
    </div>

</section>

</body>
</html>
